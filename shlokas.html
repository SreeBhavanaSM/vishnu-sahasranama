<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Learn Shlokas • Vishnu Sahasranama</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Noto+Serif+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>

/* ==========================================
   SHLOKA PAGE
========================================== */

.shloka-page{
    max-width:900px;
    margin:auto;
    padding:90px 16px 120px;
}

/* ---------- TOP NAV ---------- */

.top-nav{

    position:sticky;
    top:12px;

    z-index:100;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;

    margin-bottom:24px;
}

.nav-btn{

    width:52px;
    height:52px;

    border:none;
    cursor:pointer;

    border-radius:50%;

    color:white;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(16px);

    font-size:1.2rem;
}

.jump-box{

    width:90px;
    height:52px;

    border:none;

    border-radius:999px;

    text-align:center;

    color:white;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(16px);

    font-size:1rem;
}

/* ---------- LANGUAGE ---------- */

.language-switch{

    display:flex;
    justify-content:center;
    gap:10px;

    margin-bottom:24px;
}

.language-switch button{

    border:none;
    cursor:pointer;

    padding:10px 16px;

    border-radius:999px;

    color:white;

    background:rgba(255,255,255,.08);
}

.language-switch .active{
    background:rgba(233,196,106,.22);
}

/* ---------- PROGRESS ---------- */

.progress{

    text-align:center;

    margin-bottom:20px;

    color:var(--gold);

    font-weight:600;
}

/* ---------- CARD ---------- */

.shloka-card{

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border-radius:30px;

    padding:30px 24px;

    margin-bottom:24px;

    animation:fadeIn .6s ease;
}

.shloka-icon{

    text-align:center;

    font-size:3rem;

    margin-bottom:15px;

    animation:lotusFloat 4s infinite ease-in-out;
}

.shloka-title{

    text-align:center;

    color:var(--gold);

    margin-bottom:18px;
}

.shloka-verse{

    font-family:'Noto Serif Devanagari',serif;

    text-align:center;

    white-space:pre-line;

    line-height:2;

    font-size:clamp(1.5rem,5vw,2.4rem);

    color:white;
}

/* ---------- SECTION ---------- */

.section-card{

    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.08);

    border-radius:24px;

    padding:24px;

    margin-bottom:20px;

    backdrop-filter:blur(16px);
}

.section-card h3{

    color:var(--gold);

    margin-bottom:14px;
}

.content{

    white-space:pre-line;

    line-height:2;
}

/* ---------- BOTTOM NAV ---------- */

.bottom-nav{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:10px;

    margin-top:30px;
}

.bottom-btn{

    border:none;

    cursor:pointer;

    padding:14px 18px;

    border-radius:999px;

    color:white;

    background:rgba(255,255,255,.08);
}

.counter{

    color:var(--gold);
    font-weight:600;
}

/* ---------- FLOATING HOME ---------- */

.home-btn{

    position:fixed;

    top:18px;
    left:18px;

    z-index:100;

    text-decoration:none;

    color:white;

    background:rgba(255,255,255,.08);

    border-radius:999px;

    padding:12px 16px;

    backdrop-filter:blur(16px);
}

/* ---------- ANIMATION ---------- */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ---------- MOBILE ---------- */

@media(max-width:768px){

    .shloka-card{
        padding:24px 18px;
    }

    .section-card{
        padding:18px;
    }

    .bottom-nav{
        flex-direction:column;
    }

    .bottom-btn{
        width:100%;
    }

}

</style>
</head>

<body>

<!-- Cosmic Effects -->
<div class="cosmos"></div>
<div class="moon-aura"></div>
<div id="stars"></div>
<div id="fireflies"></div>
<div id="sanskritLetters"></div>
<div class="chakra-bg"></div>

<a href="index.html" class="home-btn">
← Home
</a>

<main class="shloka-page">

    <!-- TOP NAVIGATION -->

    <div class="top-nav">

        <button class="nav-btn" id="prevTop">
            ←
        </button>

        <input
            type="number"
            min="1"
            id="jumpInput"
            class="jump-box"
            placeholder="#">

        <button class="nav-btn" id="nextTop">
            →
        </button>

    </div>

    <!-- LANGUAGE -->

    <div class="language-switch">

        <button
            id="langEn"
            class="active">
            English
        </button>

        <button
            id="langKn">
            ಕನ್ನಡ
        </button>

    </div>

    <!-- PROGRESS -->

    <div class="progress" id="progressText">
        Shloka 1
    </div>

    <!-- SHLOKA -->

    <section class="shloka-card">

    <div id="shlokaIcon" class="shloka-icon">
        🪷
    </div>

    <h2 id="shlokaTitle" class="section-heading">
        🪷 Shloka
    </h2>

    <div id="shlokaVerse" class="shloka-verse"></div>

    <div id="shlokaSub" class="shloka-sub"></div>

</section>

    <!-- MEANING -->

<section class="section-card">

    <h3>
        📖 Meaning
    </h3>

    <div
        id="meaning"
        class="content">
    </div>

</section>

<!-- WORD BREAKDOWN -->

<section class="section-card">

    <h3>
        🔍 Word Breakdown
    </h3>

    <div
        id="breakdown"
        class="content">
    </div>

</section>

    <!-- MEANING -->

    <!-- <section class="section-card">

        <h3>
            Meaning
        </h3>

        <div
            id="meaning"
            class="content">
        </div>

    </section> -->

    <!-- REFLECTION -->

    <section class="section-card">

        <h3>
            Reflection
        </h3>

        <div
            id="reflection"
            class="content">
        </div>

    </section>

    <!-- BOTTOM NAV -->

    <div class="bottom-nav">

        <button
            class="bottom-btn"
            id="prevBottom">

            ← Previous

        </button>

        <div
            id="counter"
            class="counter">

            1 / 3

        </div>

        <button
            class="bottom-btn"
            id="nextBottom">

            Next →

        </button>

    </div>

</main>

<!-- DATA FILE -->

<script src="data/shlokas.js"></script>

<!-- PAGE SCRIPT -->

<script src="js/shlokas.js"></script>

</body>
</html>
